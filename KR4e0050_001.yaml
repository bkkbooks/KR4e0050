body:
  text: 望雲集巻一明郭奎撰五言古詩希庶齋為姚忠賦帝舜稱大孝天下猶敝屣父母或在堂不許友以死聖賢有明訓百行由此始昔當漢祚衰曹暪奮雄起嗟嗟劉豫州士慕如歸水君臣分未定徐庶乃為子方寸以親亂慷慨謝知已後世稱其賢髙名䇿青史誰謂千載下行迹偶同軌念君遭艱虞羈旅萬餘里結齋匡廬陰菽水具甘㫖愉悦承親顔樂在其中矣大江何滔滔河流亦瀰瀰思君石也堅患難安所止今為二千石孝養良無比贈程明善囘省南州炎暑地時雨變蒼涼况當孟夏交卉木含清芳别離殊可嘆且與子同裳晨朝啟斯館大江何茫茫旌旗照白日長風送龍驤揚帆適利涉逺矚猶連檣王事宜努力肅肅戒宵行瞻彼西掖垣列宿聨輝光魚樂在游泳鳥樂在囘翔思懐安在已因之川路長秋日次右司韻秋水竟長川亭亭對孤嶼覽君瑶華篇往往似仙語歡遊繼晨夕追昔念徂暑揚舲濟東湖采蘭臨北渚落日散餘霞輕風度微雨囘瞻城堞表樓觀襲空宇渺渺帝子洲衰草亦萋只鳬鷖相翺翔漁歌起前溆星霜忽已周遲留感年序睇彼東南天馳思久凝佇擬古贈别孟冬霜露降悴彼荷與蒲青青蕙蘭芳采之將焉如贈君夙昔意聊以慰斯須絃歌厲清響置酒歧路隅親戚念逺行各言勉良圖常恐不為樂日月方其除晨風奮髙翼北林多古榆臨歧執子手安得同車驅春暉堂為子徽賦遊子念離别有客同故鄉三嵗始一見春日已載陽入門叙契濶拜母升髙堂晴暉曖遲和卉木含初芳蘭生欲覆堦桑榆聯景光妻子勤中饋珍殽恒自將眉夀百福具㫖酒盈華觴飛雲淡悠然采衣爛成章寸心保終養庭草萋以長雖非舊里閭為樂殊未央送陳克明還茶陵省親驚颷吹浮雲迴薄西南天鴻鵠奮髙舉翺翔何翩翩眷彼志士心日月同皎然排難為時出安能守一㕓千金不足顧豈愧魯仲連明公素延覽知已誰能賢得君若敵國器重猶瑚璉良籌無遺䇿慷慨誼彌宣去鄉逾十載兄弟㑹有縁怡怡問親夀以享黄髪年寵禄自上錫秣馬今當旋初陽麗遥甸被服華且鮮往哉樹令徳保此忠孝全過皖城弔青陽先生維舟大江滸攬梯登茲城哲人不復見黄鳥悲且鳴髙山尚巖巖梁木何其傾忽逄舊耆老向我宣忠貞明公宿有誓慷慨存遺銘死即為厲鬼生當殄長鯨應敵既神武百戰縱以横精誠貫白日天子無援兵嵗久矢石竭捐軀全令名秋林讀書為章光逺賦大禹惜寸陰宣尼嘆川逝但恐光景馳及時當自勵禍亂非所常誰能遯斯世矧伊賢者心怡然與神契典籍對先聖樂道以忘勢考槃在澗阿衡門復長閉几席不暫違絃誦日相繼椅桐交前庭雜彼松與桂緑竹植後園蔬菓亦時藝霜葉初焜黄餘陰落秋霽散帙聊逍遥臨風游復憇周流同天理優哉永終嵗送周明卿秋氣肅已勁茂草凝朝霜重重陵上栢緑葉含馨香薄言采其華貽爾逺道將服食足夀考卒嵗希不忘惟惜當離别歌竟匪成章願瞻鴻鵠舉思逐浮雲翔徘徊欲何依美人在西方既怡平生愛狐裘諒同裳義以金石固情以歡㑹長乾餱懼失徳君子敦周行九日偶成良辰惜難再秋序條已殫登髙啟飛閣望逺俯層巒寒菊正盈把濁醪方共歡微此一日宴客懐殊可嘆贈别朱隱君庭樹悴其芳凝霜一何白鳬鴈方南飛翺翔振明月誰能弋此物加飡可為悦念子諧宿歡晤言兩反側一心抱衾裯衣帶縁以結斗酒怡親愛聊慰歧路别思駕雙鳴騶馳彼秦與越毋為守窮廬悲歡年嵗迫擬古思友鶡鳴嵗將晏蒹葭凄以霜思君隔山海道路悠且長睇彼參與辰清夜悲未央狂颷西北至一鴈方南翔言念疇昔歡與子同衣裳安知異寒暑日月不我將天髙則有斗川涉愁無梁憂心隱如惄出户徒彷徨宋節婦白石何鑿鑿流水亦湯湯女子竭名節矢死臨路傍父兄夙有訓夫亦儒者良昔恐行露濡今值豺與狼辱身義所重性命如朝霜被髪就深淵瞻彼天蒼蒼將貽共姜美不媿曹娥傷婦道日云替爾獨循綱常臨難不茍免烈哉丈夫行送姜彦英還錢塘二首浮雲斂沉晦白日揚光暉條風扇首嵗念子行將歸山水淡餘靄草木含清暉誰謂道路逺去矣趨庭闈伯氏既吹塤仲氏和以篪譬彼棠棣花枝葉相因依願言崇孝友百嵗恒不違安得黄鶴羽及爾俱南飛東南有髙樓華月照綺楹瓊筵列海錯雜以絃歌聲疏簾捲晨夕迴瞰蒼江清君今利攸徃我獨懐鹿鳴執手望長路駕言出東城嘉㑹常不足何况臨當行晴郊芳樹碧緑渚春蘭生持觴意難盡相思空復情寄李彦端嘉樹藹夏緑清風動虚襟念君有髙趣勞我徑寸心佇立東城曲日夕見雲岑以茲世多故忘彼升與沉聊樂在書籍佩玉懐所欽華池散帙步當户鳴幽禽蘭生已覆井泉響迥出林醉將山口月彈作絃上音明月照别鶴遺音戞南金何當坐松石從爾聽瑤琹次錢子貞蘇門感懐燕支木葉落盧龍秋色来空閨有思婦清夜悲且哀錦書為君寄寳鏡誰敢開膏沐不復容緑髪栖浮埃團團皎月輝照彼單于臺馳心在萬里出户聊裵囘雜詩孤月江上明清光泛流水北有愁思婦南有游蕩子蕩子行未歸思婦安所止姑老在髙堂貧賤復如此君行忽逾年膏沐誰為理妾心金石堅不逐浮雲起㑹合良未期離亂何時已君當復来歸妾當効同死凌風願翺翔揚波願杭葦再遂平生歡被服紈與綺夏夜浮雲散髙空涼露滴清響岸幘臨華軒逍遥絶塵想碧樹含先秋蛛絲結低網寒暑悲嵗年日東月西往寄迹如流萍遥遥背鄉黨飛鸞久不歸孤燈在虚幌豈無琹與尊惜此芳年賞竟夕空裴囘俛仰極天壌紀夢忽忽頹芳年揺揺寄行役寢興勞形神鬂髪𤣥已白驚風響庭樹憂思日常積夢魂清夜歸彷彿舊鄉邑青松在園田桑柘蔭廬室飛鳥雲際還牛羊下来夕澄湖淡微波秋山有佳色鷄犬雜比隣墟烟靄阡陌怡怡兄弟情凄凄丘隴側伐木逄行歌僕夫候馬立臨流濯長纓挂冠坐磐石似慰平生歡覺來異疇昔百年如轉蓬萬物乃遺舄天命良在茲勿得云得失贈田有常嘗聞安平君智勇特殊絶揮指卻燕師談笑復齊業遺此國士風子其奮英烈長才文武并名駒汗已血黄金飾横帶劍光照氷雪决機兩陣間誰及美髯伯彤弓錫竒蹟因之樹旄節投戈或賦詩髙堂坐上客時務貴先逹歡遊任豪俠舉首望雲臺誓清呉與越贈别喻秀才慷慨天下士獨奮千金軀義當報知已力能致雲衢懸河有竒辯坐使儀秦愚酒酣撫長劍邈彼東南隅我歌正激烈願君立斯須諾重山岳輕竹帛埀名譽寄陳教授敏蘭葉欲覆堦馨香襲芳室雨露之所滋惠風偃華質采采不盈筐薄言贈離析憂傷嵗月愆同聲而異迹人生寄百年寒暑㑹有役歡樂難具并浮名亦何益髙誼諒匪他可以比金石從軍行大風西北起江漢雲飛揚相知拓南土展此萬里疆飄飄赤羽旗矯如飛龍翔前軍屯細栁六師後張皇被服華衮裘雜以明月璫金相玉其體文彩自成章桓桓虎賁士左右羅干將良馬亦既閑翩翩驪與黄彤弓盧矢倍受言宜允臧一舉清呉越再欣漢道昌恩澤沛若霖閩海俱懐康謳歌頌明徳樂矣華山陽贈别蟋蟀悲嵗暮起視夜何其凄凄霜露降蕙草颯以衰薄言子當往軒車發何遲聊因一杯酒慰此平生知采采西澗蘋悠悠懐我思我思詎能已君心諒不違九日集宴良辰易為樂極宴忘歸田邀我二三友列坐清尊前嘉殽雜霜栗左右陳豆籩寒暑有代謝惜此少壯年濁醪泛秋英仰聆金石篇避世慚淵明登樓懐仲宣醉舞起自慰撫掌齊拍肩陶然得真趣物慮何足言貧女吟猗猗石上蘭青青澤中蒲貧家有美女二八嬌如荼朱顔不自媚貞固良難誣少為父母惜生長紅羅襦綺樓髙且深竊恐行露濡一朝零落盡萍迹湖東隅塵沙陋茅屋不濺氷雪膚鴛鴦欲得織翡翠愁還梳鳴鸞在何處坐惜華芳徂耻作商人婦願奉君子儒妾心擬有托請賂雙明珠送王彬叔往同安駕言出城門遥望西南路别離良在茲嘉㑹不常遇置酒張瓊筵綢繆復凝佇飲餞未崇朝聊以慰情素翩翩白羅裳皎皎瓊瑶樹髙步凌青雲豈為緇塵汚春江及信潮方舟襲蘭杜小人衆所疑君子誰不慕久欲同車子攀轅莫能去惜哉苦淹留年芳易遲莫顧瞻懐殷勤增我越鄉慮南州亂無家㓂盜縱横馳白骨蔽原野火炎城與池千里何蕭條四顧令人悲倬哉皖公城當此江之湄崇墉上峩峩陣列紛魚麗明公秉髙節徳澤被華滋而䝉天子恩慰爾長渇飢大田既多稼王師良有儀君行利攸往樂土寔在茲嘉賓復来集兼遂平生知春蘭麗芳渚鳴鳯翔髙枝裴囘歧路側未忍言别離别離何以贈載咏南山詩次劉仲孚夜坐見懐職曠謝奔趨賦詩悦情性如何晨夕間適與故人並憶昔田園居荒苔没深徑讀書恒閉門永日亦閑靜嘉樹交扶疎飛泉㵼清瑩置觴㑹親友忘言及從政曲步聊逍遥澄湖月初瞑風波忽異時此樂良未竟愧彼瓊樹姿芳華蔚相映翰墨沾餘香終當就髙詠送友賦客從西方来袖手持短書秘之河與洛開此皇極圖天經及地緯厯數敦唐虞公子雅敬賢置彼承華廬進食列上座接燕常歡娯一言决大義再語驚世儒都布裁單衣玉佩埀以珠出郭門相贈臨觴復踟蹰白日忽已暮方駕當前驅瞻望凌敲臺磐石為安居七哀詩颷風西北起陰雲薄南陲冉冉嵗云暮惻惻心内悲辭親逺行邁已越三年期昔為連根樹今若遊地絲形影竊自弔朝東暮西馳不學齊仲連翻作楚鍾儀南冠愧流竄短褐誰相知性命寄須臾面色含飢疲明月在東壁願照濁水泥泥中復何見沙礫紛參差下有沉沙珠上有瓊樹枝瓊枝良可依終不埋光輝游羅漢寺步出城東門褰裳涉西澨幽尋窮四郊日入未遑已逍遥逺塵蹤夕憩空門裡陰堦轉長廊金碧炫晴綺園池清且深水竹澹如洗追念疇昔歡豈謂重来此春日忽載陽百物含芳卉好鳥向我鳴髙僧見人起閒雲石上生天花覆瑶几信宿方告還行行詎能止悼亡皇皇三十嵗厯厯多艱辛骨肉一朝散飄若行路塵涉江賦羈旅形影私獨親寄身在䘮亂托跡思沉淪行歌摽梅詠卜爾為婚姻爾才既明敏爾徳良且淳結髪未一載恩愛猶千春相知願白首相敬如佳賓常懐孟光志不厭黔婁貧所以共患難顧慰尤殷勤夭夀固難貳天亦胡不仁蒺藜忽在床傷我同心人孤鸞失明鏡幽蘭折清芬杳杳長夜臺悠悠泉路魂凄凄不復見涕泣徒沾巾題彭克讓心逺亭彭城有遺則軒冕皆泥塗誰能繼清躅伊人常晏如夙好在文籍少壯從戎車功成不受賞棄官歸田廬已就市㕓隱但忘形勢趨出郭視阡陌翳翳多桑榆逍遥度前溪愛此濠梁魚飛雲日夕還青山當户隅左招滄江月右集圖與書賓至引觴豆時復藝園蔬意愜澹無慮心逺聊自娯寄言陶徵君吾願為爾徒從軍詩朝濟彭蠡湖暮上匡廬山軍行飢且疲露宿聊解鞍方秋黍稷華徂征西南端奄忽嵗云晏雨雪凄以漫擊柝豈能寐哀哀想苦寒戰塲久勞役裘褐俱不完鸛鳴在丘垤思婦應長嘆誰無内顧懐受命誠獨難三苗阻聲教師出猶未還願公折天威戢舞羽與干上瞻泰階平下覩斯民安勞旋詠杕杜貽爾室家歡待月臺為黄文中賦微雲澹清夕置酒臨髙臺逍遥斂巾幘既酌仍停盃呼童滅華燭以待明月来始望東南端復集西北階須臾見光彩流影漸裴囘徘徊欲起舞傾我尊與罍圓光皎中天大地無纎埃俯視曲水湄謾觀波縈迴零露時已盈桂樹先秋開城上有警柝廣庭多古槐東家嫠婦泣西家絃管催時固有如此我獨何悠哉長歌逹明曙樂此平生懐滕王閣西南有髙閣下瞰滄江清飛闥百餘尺複道周西楹白日一何麗照耀丹青明借問誰所為云是滕王嬰壯哉大唐業封子臨斯城佩玉襍鳴鑾物換星亦更勝地罕常見賢者埀令名昔聞華子魚杕策迎呉兵英雄各適用鼎足形遂成相公布文徳復此嘉㑹并羣才若雲集頌以謳歌聲陽春不為樂萬物爭光榮登髙矚曠世臨流忘濯纓再拜述短辭柱石齊天傾贈希武郎中迴車發東越馳彼西大藩帶郡千萬里江介慿中原所在神武師人馬如雲屯周爰訪善道利賞由至言報以國士重將宣明主恩采葑思下體况乃蘋與蘩始㑹即長别分逺情彌敦亮君秉髙誼予復何所論望雲集巻一
