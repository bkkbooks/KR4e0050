body:
  text: 望雲集卷四明郭奎撰七言律詩秋興月下清砧響夜闌征人不寐憶長安霧迷南國遊魂泣草沒中原戰骨寒直望明河臨象闕誰霑零露捧金盤十年關塞無家别仗䇿猶悲行路難龍門疏鑿禹時功江漢滔滔亦滙東萬古山河今異域百年禮樂舊同風忽思鱸鱠慙張翰將學丹砂就葛洪秪恨兵戈猶在目秋來衰鬢對飛蓬霧氣凄涼草木衰倚樓看鏡不勝悲秦王警蹕瞻天逺漢武旌旗出塞遲江國再逢南鴈信鄉關徒倚北風思那知人事同搖落醉裡狂歌九辨詞答人見寄五色新衣照日鮮平生湖海氣飄然茅容孝養如今日蘇武生還憶去年秋水芙蓉花共潔嵗寒松柏操彌堅巴人擬和陽春曲昨夜援琴理七絃獨立漢廷如汲黯欲羇南越等終軍威容面折千金諾議論風生萬馬羣濃花池館開春酌落日江亭惜路分想到清秋無限興坐題桐葉寄殷勤自傷孤鴈影翩翩避弋南來折復旋塞上牧羊幾陷賊中山尋鶴托遊仙黃冠偶倩傍人正寶劍誰為烈士捐華髮秋來埀兩鬢江湖憔悴任吾年過廬山扁舟一日過彭蠡坐看匡廬五老峰瀑布似從銀漢落香爐半是紫雲封東南父老應占氣江漢渠魁已遁蹤自古山河歸有德遙瞻華蓋護蒼龍夢遊京兆髙樓鼓角五更悲河隴秦川入夢思萬國曾頒周玉帛六王終屬漢旌旗遙瞻華嶽臨天府直顧中原跨地維百二重關在經略不知國士正當誰早秋旅夕初月涼風夜向闌倚樓愁到笛聲殘天髙閶闔銀河白露滴梧桐金井寒多病馬卿猶是客幾時張翰也辭官年年怕近清秋日憶殺湖邊舊釣竿涇縣涇川不減若耶溪况有招提在水西四面雲山當縣合五更星斗落簷低拿舟來訪桓彛廟立馬空慙李白題但願功成身退早桃花潭上結幽棲當途客舍姑孰溪邊獨倚樓江城二月似深秋孤雲無處求親舍先隴何人祀首丘花落始知寒食過鴈歸渾是夕原本闕與從兄十郎夜話詩闕謝程道惠帽詩闕髙樓詩闕雨夜詩闕桃花詩闕六句故園卻信天台隔回首東風路渺茫臘日臘日三年為異客今年霜雪未全饒風塵暗滿淮南路霧雨寒生江上潮鄉夢有時逢骨肉此身何處托漁樵共來吳楚交兵地烽火依稀似六朝過彭澤舊縣黃梅細雨濕征衣四月江天暑尚微彭澤至今遺縣在陶潛從此棄官歸當時天下方憂亂後日中原自解圍叩馬誰能重進諫北風無限故山薇寄劉仲修知府一錢太守紫髯白清曉褰帷對九華已召諸生修禮樂重尋父老問桑麻公庭吏散棠陰直寢閣詩成日影斜為我髙懸徐稚榻從軍間暇定移家答人見寄滕王閣鐵柱觀憶昔滕王臨勝地頻登飛閣俯岡巒軒車如雨當時集歌管停雲暇日歡帝錫符章金粲粲神遺劍佩玉珊珊使君感興成今古白雪詞髙欲和難列宿參差樓上頭千年劍氣為誰收雲低南浦神仙去日近長安帝子留歌舞已銷亡國樂英雄終作濟川舟水邊闌檻今陳迹秪使騷人念昔遊許令仙符勝武韜指揮川嶽駐神鰲三江地軸西南鎮一柱坤維上下牢雞犬當年同變化蛟螭何處得潛逃丹砂願就洪崖學浮世誰甘塵土勞山中喜晴山中十日苦風雪霧雨作寒才放晴千澗水從松杪落半空雲逐馬頭行居人向暖分茶樹啼鳥知春喚客名不惜看花兼問酒東風歸路布袍輕寄黃文敬一載不逢黃叔度每勞書信寄殷勤秋風有思題紅葉海鶴何時渡白雲列國諸侯爭尚禮前朝名士素能文邇來城市無蹤迹髙卧橫山學隱君送李克允還黃山别業薊門公子息齋孫疇昔相知禮數敦墨竹清風天下慕玉堂遺史後人論衣冠到此如君少禾黍依然别業存三十六峰蒼翠好桃花潭水接東原次范子權九日每為思親賦白華江頭修祀薦蘋花百年幾度逢重九四海何時定一家遺俗舊沾麟趾化故宫誰起黍離嗟知君醉把東籬菊更上髙亭待日斜次並頭蓮韻華蓋髙張翡翠圓渚宫深鎖對嬋娟雙瞻太華峰頭月並是耶溪水上仙羅襪凝塵鴛頸合湘裙濺淚鳳叉聯只愁風雨遺清恨玉井溫泉共惘然次夏博士見寄瀛洲學士賜衣新纍牘連章獻納頻關內列侯丞相重江南佳氣帝王真掖垣退食全無事帷幄談兵似有神却笑腐儒塵滿鬢一生辛苦不憂貧次人韻文星雙璧一時除駟馬聯鑣進諫初天下爭衡連上策省中論治共封書日求岩穴遺賢少雲集衣冠尚席虛更有司徒掌邦教漢家全盛復何如望黃山昔曾避地黃山曲今在丹崖正面看曉翠障空迷去馬晴霞迎日見飛鸞九華髙並芙蓉秀五老遙連瀑布寒中有羽人期汗漫拂衣松石待休官對硯感懷因悼葉宗海南州葉滙舊情親石硯相貽色尚新長憶論詩兼嗜酒不堪覩物忽思人樹深黃鳥哀秦士浦暗青蘺泣楚臣妻子寃魂應共語定將憂憤訴江神重吟重吟梁甫自悲嗟為惜流年鬢有華馬上折殘官路栁雨中過盡野墻花秦原萬里經圖逺楚澤三湘眺望賖人物尚思羊叔子峴山歸騎詠清笳秋夜偶賦漢髙曾唱大風歌壯士無衣奈嵗何永夜蛩聲偏近枕深林木葉未辭柯􅜇鴒毛羽嗟零落騏驥精神困轗軻尚慕信陵公子客幾時報德在山河詠霍先生梅杖帶雪橫枝伐作笻老年筋力賴從容扶經谷口間尋鶴拄過深潭恐化龍直節舊盟君子竹孤標曾伴大夫松時時策向洪崖頂應憶臨流賦辟雍過富川贈權伯文章江寒夜泛舟初岸曲沙平月色虛兵氣未銷吳楚分劍光猶射斗牛墟明公偶國專封拜使者交鄰奉簡書為喜豐城知已在别來懷抱定何如樂平山中題操氏壁舊宅荒涼木葉疏元戎此日暫停車連營烽火傳呼急夾道旌旗戰伐初天下十年非樂土江南萬姓望安居楚狂辟地休相訝早晚河清洛出書金陵簡劉仲修昆玉姑孰城中君送我端陽重上宛溪船多情雲樹愁如海回首風塵暗隔年東海未成髙士蹈南冠應賴故人憐重來不見劉公幹别卜交期在九泉出五城五嶺東頭更五城一川如出武陵行人家煙火連機杼蠶婦桑麻執篚籯春日向暄田鼓急曉溪初漲石梁平十年歌舞揚州夢爭似依山閲耦耕别劉友人西垣日近諫書稀共説仙槎出紫薇陸賈能令南越服隋何定使九江歸千花夾道瞻星使萬騎聯鑣侍錦衣早晚白門春酒暖皇華錫宴敞彤扉得鄧原書兼寄李可宗鄧禹有書才寄到李膺埀白往京城自從宛水橋南别誰共開元寺裡行海渚曉潮催桂楫燕山秋露濕金莖故人同沐恩波去我獨天涯愧此情酬謝帥贈靴東郭家貧才露趾將軍獨贈錦靴新全勝公子真珠履最稱吾儒小角巾步月暫沾銀漢露踏花終涴玉京塵幾時醉向金鑾脫只恐髙家力士嗔中酒春來中酒朝朝病擁被髙眠懶出門草緑漸迷湖上路花開未到郭西村湘娥有瑟催歸鴈楚客無書託故園惆悵東風醒亦醉夢中常是賦招魂遊三門山黃茅蓋屋石為門路轉溪回更有村果樹連園收芋栗豆花滿地散雞豚雲深易就漁樵隱山逺全忘市井喧何獨武陵堪避世此中佳處亦難言蒼山夾水洞陰陰溪上人家竹十尋田土未饒盤谷好雲霞全似鹿門深半簷松月斜連榻萬壑風泉響出林我亦乘舟追李白故人幽賞在鳴琴送吳師程山長還宣城君歸鄉國我淹留寶劍長歌不盡愁此日髙城尋第宅故家喬木在林丘將軍豈識千金子丞相曾封萬戶侯别後相思重回首白雲飛散敬亭秋宿雨宿雨瀟瀟悴客心髙窗連日滯秋陰一枝未遂鷦鷯托四壁應愁蟋蟀吟家在淮南青桂老門臨湖水白蘋深鯉魚風熟香粳早釣艇誰撑近竹林寄夏咨議允中鳳凰臺前江水寒明月出在青雲端詞臣草檄醉騎馬商女彈箏驚舞鸞地勢吳頭兼楚尾山形虎踞共龍蟠斗南人物君為最爭説髙名似謝安次孔都事見寄宣聖諸孫君最逸寥寥鳴鳳起豫思玉鞭聯轡晨趨省銀燭分題夜賦詩王氣又從鍾阜出文星長繞石城垂遙知退食從容處紅藥翻階露滿枝寄貢友善城上烏啼夢已殘桂花零落露漙漙玉繩低映千門曉銀漢斜連一水寒我為久貧常露趾君雖有喜莫彈冠遙知秋色黃山裡朝看丹霞夕採蘭寄江朝宗照磨丞相府中曾試掾郎官年少獨憐君彤庭退食聯鑣出金鎖開門待漏聞經學舊精商魯頌檄書全擬漢唐文間陪阿閣東頭宴五色儀鸞繞慶雲題萬户手卷江東子弟義為兵萬戶新承紫綬榮吳楚故都形勝在春秋國士武文并五花習射宛西馬細栁連屯霸上營閩海百蠻猶未服幾時整旅又從征贈王都回省事城南四牡總騑騑江上旌旗帶夕暉共喜竇融千里至更同陸賈一時歸圖書在洛還王土龍虎為邦護省闈宰相勞賢應自出鹿鳴花底醉金衣寄于清叔金陵隱者天下士六十為文健且竒諸父不諳麋鹿俗令郎俱有鳳凰儀長干橋上間沽酒玄武湖陰醉賦詩書史滿床琴在匣秋來相對鬢如絲次丘太守韻翳翳桑榆晚正宜夕陽山色望中竒鷗盟逺渚誰爭席鶴放長松自擇枝疏廣賜金忘得少陶潛束帶怨歸遲黃花時節牽兒女爛醉籬根且賦詩答王克讓南朝冠蓋富才華謝朓新詩五色霞江水東來歸渤海河源西上接流沙如今駿馬誰收骨自古牽牛不服車每憶故人王逸少滄洲拾翠折疏麻重憶西岩訪舊鶗鴂聲中宿雨晴白雲間傍馬頭生東鄰茅屋新煙起南澗石橋春水平野鳥見多還問姓山花開盡不知名故人宅近青松下未到柴門已出迎亡家夜看羣星指太微東南豪氣眼中稀每言富貴心如鐵才説英雄泪滿衣杖策鄧生猶未遇亡家韓信定誰依凌風欲便乘槎去天上秋虹跨海飛夢歸昨夜三更歸夢惡滿湖風浪棹孤舟山妻化石不知處慈母倚門猶帶愁伯仲凋零傷骨月田園蕪沒在松楸城頭有樹烏啼醒斜月照人清淚流送文景宗海內干戈未解紛明朝歧路又離羣他鄉嵗暮萍逢水此去江東樹隔雲白面書生多國士黑頭宰相是將軍寶刀聊用酬知已同郡名家賴有君嵗暮兵戈猶未決雌雄憶昔庭闈似夢中兄弟稱觴家慶具比鄰伏臘嵗時同十年主祀誰供藻萬里從征尚轉蓬况復天涯愁雨雪哀哀鼓角戍樓東答王克讓萬國煙塵海沸波夕陽誰復倒回戈華戎雜處衣冠少吳楚封疆壁壘多説客成名惟季子功臣改轍在隋何故山猿鶴應相訴桂樹叢生帶薜蘿重過廬山廬山髙與南斗齊北視泰華千峰低中天瀑布飛素練半壁晴霞照紫泥五月雪花飄絶壑萬松雲氣帶回溪神仙有棗如瓜大欲捨歸舟便買梯過南康舟行十日至湖上遙見香爐若畫圖仙迹每從佳處得客愁頓向此中無市沽不醉重烹鯉野飯停餐旋刈蔞欲弔陶潛過栗里亂山松菊正荒蕪望雲集卷四
