body:
  text: 望雲集卷三明郭奎撰五言律詩題裕約之圓通舊隱匡廬最佳處石耳兩峰齊寺有圓通閣亭餘蘇子題萬壑飛霞滿千松積翠迷願結蓮花社從師過虎溪為劉君道賦昱嶺關東南多竒險茲嶺冠羣峰棧道一千里函關百二重邊聲愁虎豹海色落芙蓉之子三年戍勳名待錫彤賦得黃山寄鄭隱君恆昔聞軒轅氏學道在茲山合沓羣峰秀飛鸞雲際還丹泉溫可掬翠壁濕難扳羡爾逃名者冥棲杳靄間和蔡都事見寄泛泛仙槎逺雲津月未沉水光明使節星采動詞林夙駕江亭迥前瞻浦樹深瑶華如可拾願得繼髙吟贈醫者黃秋圃蜀都有良士家世住東川鞭叱羊為石丹成犬化仙醴泉浮橘井膏雨下芝田江漢倦行役相逢夢十年途中除夕客路誰相識燈寒暮景收一年今夜盡千里異鄉愁骨肉知何在漁樵欲共遊嵗華明日度飄泊逐孤舟日暮日暮親朋逺音書寄不將年光隨水逝秋色逐城荒短褐風塵滿扁舟道路長倚樓兼覽鏡無興慰凄涼寄劉彥肅露白蒹葭蒼伊人曠何處瞻彼雙飛鳬誰能忘眷顧月出廣陵堤風生京口樹未卒同袍歡徒悲嵗將暮金陵道中野迥望雲孤風塵暗海隅鄉心懸落日旅食倦長途夢斷巢湖上行臨建業都春歸未可卜獨立向蘼蕪次劉仲孚地逺孤雲白秋深一鴈過淚因明月下心在故鄉多列郡方傳檄連營未息戈羈危萬里思江上逐馳波遊景德寺貽黃文中此地登臨慣傷心萬里思江雲愁北望越樹指南陲古寺開元迹長廊景德碑每因黃叔度日暮醉歸遲枕上酒醒鄉夢斷枕上憶慈親異地難為客長天愁殺人寸心千里隔孤劍一身貧江濶無舟楫歸歟欲問津哭當途王宰及其子亨我憶當途令官間不早歸王戎號共死阿對走相違兵火有時息仙鳬何處飛愁雲兼楚樹江上晚依依偕江邦善飲因贈南國江淹賦長沙賈誼書孝亷慚漢末進士憶唐初旅鬢愁中短人情亂後疏因君情思好時得慰離居哭江學正玞不見江淹久猿啼近野墳鄭虔曾陷賊王粲未從軍賦好人爭慕官卑世罕聞招魂豫有些地下已修文髙興湖海生平氣飄飄薄五陵年華雙短鬢夜思一孤燈多病慚莊舄相知憶李膺星槎如可待髙興有時乘送孫良玉還同安送君江上去山路雨初晴落日平淮樹春潮帶皖城酒因今日醉人是故鄉情莫説王孫怨芳洲緑草生送王素行昔日從遊處舒州阿那邊寧親依故國辟地到何年月出潮平渚江深樹接天同門知已在應問孝亷船春日遊敬亭山冠蓋聯鑣出晴郊北路分我尋何水部誰似鮑參軍芳樹聞啼鳥飛泉隔亂雲題詩兼勸酒聊樂在殷勤遊升真道院兵火經餘嵗琳宫結搆新山重溪接屋松古鶴為鄰試藥封丹鼎飛書報玉宸浮雲身外事惟有學升真客枕客枕睡不著天髙秋氣清寒燈照四壁孤淚滴三更霜落芙蓉悴江空鴻鴈鳴無衣復無褐忽忽嵗徂征首夏東城姑孰宿雨忽開霽山光淡碧滋歸雲度大澤流水積華池氣屬清和景歌翻白苧詞桓溫今已矣人事復何為寄鎦知事雲淡倩山夕燈湖更在東何人共來往獨憶紫芝翁餘霞散江渚帆落上潮風沿流弄明月安得與君同嵗暮寒月出在户江城鴈獨飛愁人不能寐鄉淚忽沾衣丘壠十年别星霜兩鬢稀為言叢桂老嵗莫淡忘歸出郭出郭策駑馬青山十里亭茞蘭和露采禽鳥隔花聽左揖仙人墓前瞻使客星翻思昔年路茅屋酒初醒暇日訪楊廷舉故人楊伯起作尹似陶潛白紵山前宅荆華半覆簷溪魚鮮可食崖蜜􅍄應甜把酒謝知已平生清且亷贈內兄張行中鄉里通家好閨門令妹賢如何十年內漂泊一身全落葉空江雨征鴻絶塞天白頭傷骨月相對各澘然城東訪胡伯昭郡郭東十里蒲塘秋水清間僧偶相見好友舊同盟曲道通官墓蒼山夾石城草堂公子隱何用世知名題無相庵尚書塘上寺寶樹雨花多説法龍曾聽談經鹿更過燈影懸晴塔香煙散曉坡空門真樂國浮世欲如何寄田有常平生經濟策國士更無雙遙知敬亭下清興滿軒窗孤雲坐來晚落日帶澄江車馬三千客相隨擁蓋幢琴溪吾慕琴髙子於焉隱遁棲松雲生峭壁山雪漲回溪古迹行人識新春好鳥啼學仙誠有道安得謝輪蹄三溪飲馬三溪上長亭驛使催千山猶積雪一路盡寒梅樵觸岩雲動猿依嶺樹哀初疑畫圖裡又恐是天台五嶺侵晨登五嶺石磴畏躋扳急雪沾衣白因風點鬢斑雲連秦劍閣天塞漢蕭關想見當時路班超奉使還寄孫伯庸吳樹緑如蓋越山天下竒遙知戎事暇總是雅歌時國士曾持節將軍已建旗宛西有名驥安得為君馳與魯志敏同舟清夜泛蘭舟因君慰别愁露光浮草白月影散林幽羽檄傳新捷圖書憶舊遊方知魯子敬雅量邈難儔蘄州營作樹暗啼鶯困春餘一日殘愁隨花片減夢逐雨聲寒毁譽惟耽酒辛勤亦枕鞍令人慚陸抗四十未封官月夜次人韻髙人寂無寐乘月坐南樓露浥纎絺潤涼生紈扇秋玉簫吹半夜蘭枻鼓中流清興忽不淺因之宋玉愁秋樹次韻嘉樹如車蓋虛亭帶夕陰蕭蕭露葉下靄靄浦雲深好鳥頻翻翮幽人亦散襟祗愁霜霰集搖落嵗華心歸耕叟次人韻素慕商山隱投簪歸就耕比鄰間偶語木石淡怡情簷下片雲宿林間一犢鳴嵗時具尊酒聊樂在平生郡齋秋日次韻幕府簡書靜一官清自間秋聲在東壁爽氣滿西山叢菊可延夀芳尊聊解顔當軒兩嘉樹好鳥暮知還九日將至次韻秋節重陽近吳歌子夜哀棲遲為客久懷抱向君開言採籬東菊聊登江上臺白門多美酒誰寄一尊來出昌山峽遇雨山雨凍欲雪誰憐被褐徒手持和氏璧袖有太公符勳業歸明主衰遲笑腐儒年年此時候行役在長途與黃本和同舟宜春臺下瀨輕棹疾如帆人物同黃憲風流似阮咸寒花猶覆石飛翠忽沾衫出峽頻回首蒼茫日半銜人日新年人日至殊覺客愁多故國音書杳南天物氣和城春偏雨雪江暝足風波無限扁舟意吾將詠棹歌長安道秦川八百里直與隴西連四逹平如掌五陵多少年御栁春深緑宫花日暮鮮阿環新拜寵走馬渭橋邊出暖水向新營山陽暖水地舊是北軍屯一澗雲連棧千峰雪照門奉書觀壁壘馳驛到邊藩為卜歸人信今朝喜鵲喧又山水平生樂因之欲賦詩渡溪雲影白入竹鳥聲遲曉碓粳舂玉春耕火助災樹深人偶語倣佛鹿門期留水西寺貽季潭上人好山吾所慕今日水西遊花雨千峰暝松風六月秋龍為人聽法僧共鹿尋幽如此林泉樂榮名安足求又上方禪寂地瀟灑似天宫誰刻蓮花漏因知晉逺公雲衣留卧內松拂挂溪東已悟浮生理吾將杖錫同又潭影淡禪心髙窗雲更深偶陪林下賞兼聽丘中琴清梵聞陰壑香厨下午禽客懷倦炎暑賴此泄煩襟答人見贈風骨神仙異文章獨羡超早時登畫省逺鎮駐金鑣詩咏東山美尊開北海遙功名身外事賢逹素無驕又戎馬何年息關山故國遙霸齊思管仲伐楚問周昭往事江流盡新愁木葉飄髙樓頻徙倚秋興坐來超送劉桂芳二首城都有髙士賣卜似神仙默默不多語朝朝得百錢乘風隨列子問石待張騫我願悟茲道因之太極先又相逢惟問卜時運果何如軍正還為掾金吾不讀書十年羇旅困四海故人疏爭似長江上持竿坐釣魚登樓次李員外韻天髙秋景淡山水更清竒落鴈雲邊盡征帆日下遲郎官披繡闥仙樂動朱絲忽見芙蓉發將貽逺道思又慿城結綺樓倣佛儀鸞翥浦雲朝薄簷江月夜當戶欲挾飛仙遊恐驚黃鶴去佳人天一隅翹首徒延佇寄陳檢校遙想紫薇省郎官直禁樓瓊花天上去清夜憶揚州二十四橋月玉簫吹兩頭秋風挂帆席幾度大梁遊賦得雲夢澤黃鶴樓送李聖瑞之湖廣常聞雲夢澤空濶自天開郢樹連荆渚枝江繞楚臺日落邊烽靜春融雪水來知君有深量相對亦雄哉又飛棟何年搆巋嵬跨楚天江山殊壯觀雲鶴共連翩直上看南斗平東俯漢川固應多暇日登眺即神仙望雲集卷三
