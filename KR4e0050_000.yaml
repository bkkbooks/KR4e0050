body:
  text: 望雲集别集類五明提要臣等謹案望雲集五巻明郭奎撰奎字子章巢縣人早從元余闕學慷慨有志節朱文正開大都督府於南昌嘗叅其軍事後文正得罪奎亦坐誅明史文苑傳附見王冕傳中奎當干戈擾攘之際仗劍従軍偹嘗險阻蒼凉激楚一發於詩五言古體原本漢魏頗得遺意七言古體時近李白五言律體純為唐調七言律體稍雜宋音絶句則在唐宋之間元末明初可云挺出趙汸宋濓皆為之序推崇甚至良不誣矣五巻之末附短札三篇案嘉靖辛夘呉廷翰重刋是集但稱五言古詩三十七詞歌曲十三五七言律百有九排律雜詩四十四不言有文豈後人得其手稿附入耶集中送陳克明歸茶陵詩瑚璉字押入平韻葢古人三聲之法古詩上山采蘼蕪以素餘故同押劉琨贈盧諶詩以璆叟同押葢即其例非落韻也乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀望雲集原序昔者子朱子説詩於性情之道風雅之用備矣然未嘗不以體制音節為言他日評漢魏以来至近代詞章各極所長權度甚精而獨謂古五言不可輕變蓋述作有體變復之際昔人所難雖大儒先生不敢忽也汸游臨川時嘗以此説質于雍虞公且問所以為合作者公曰三百篇而後有漢魏六朝朱子嘗有取焉然其為體不一大抵世有治亂人品風俗不同極其才情則淫傷而無節尚詞藻則綺靡而失真善學者慎之可也余獨愛陰何徐庾氏作音和而莊思約而正華不至靡約不至陋淺而不浮深而能著其音清以醇其節舒以亮有承平之遺風焉然後知杜少陵所以稱誦不置者蓋在於此大厯元和而後知者鮮矣暇日觀公詩稿試以此説求之頗得去取大意往来江湖間每論諸能詩者或唯唯或否否唯武威余公所賦廼若一以公言為師無復他有出入而髙雅渾厚自非齊梁間作者可及豈禁苑從游時嘗論及於斯耶抑所見之偶同也自是每恨不得全稿觀之兵興以来此事姑置嵗辛丑春正月初與淮南郭公子章遇於星源子章嘗游余公之門者也因論公平居崇尚選學於後来變體一無取焉而五七言近體每欲棄絶不為公大節既立而詩文皆散逸罕存矣聞者相與太息於是乃得子章所賦曰望雲集者與一二友朋共吟諷焉古五言逺宗魏晉得其髙風逺韻不襍後人一語近體亦質厚微婉足以逹其志氣所存信乎淵源之有自也又可見余公居常教人悉本朱子至其斧藻盛時陶冩幽抱獨與虞公相表裏而不必他人之已同斯其所以為合作者與以子章之才能守師法而不變亦可謂賢矣友人有請而傳之者乃述所聞書于巻端庶觀者知所自来也或曰郭公志士也今四海横流生民塗炭起管夷吾舅犯先軫諸人相與屬櫜鞬執鞭弭以救之猶恐不及顧相與論歌詩之源制作之體無乃非公意乎雖然吾聞子章少無宦情嘗欲泛大江上三峽徜徉蜀漢之間覽諸山川之竒秀弔昔人經營遺迹求嚴君平岷峨之墟咨訪大人先生之流相與上下其議論然後大發于詩遭亂志勿遂也語曰在朝言朝在野言野使子章據功名之㑹真有以自見于當時而誦其詩者考論師友淵源與其髙蹈之志而傳之不亦可乎新安趙汸序望雲集者郭君子章所作之詩也子章嘗從青陽先生學治經而性尤嗜詩自黄初以降諸名家多嚅嚌其芳腴故剔句鎪辭趣味雋永而韻度婉微青陽亟稱其能曾未幾何戈甲搶攘二親與弟昆咸亡子章隻影飄零於江湖間進退無依遂仗劍從軍艱難險阻莫不備嘗凡世道之汚隆時序之推移人事之變更毎觸之於目必有感於心感久輒悲悲不能已乃悉假詩以寫之通名其集曰望雲望雲志思親也余常取而觀之何其情思之縈紆音節之激烈哉譬猶秋風刁騷霜月凄白孤臣畸士慟哭於山澤蒼涼之間而聞者莫不隕涕焉哀思之切何其一至此乎在昔先王之世四方乂寧民各保其室家頌聲洋溢播之郊廟及其衰也政賦日逼士困於行役而不能歸至有陟屺岵以望其父母與諸弟者説者謂其思之切而哀之至况子章兵難相仍非特行役之勞而已親没家燬非特不能歸而已宜其情之所觸有不能自已也夫以子章之才之美不生於太平無事之日以頌清廟閟宫之盛顧獨馳騁于變風之末嗚呼其命也耶其命也耶雖然否與泰相為循環者也今天已厭亂戈甲將向息矣子章方宣嘉猷以著勞烈其必吐和平之音以鳴天下之盛耶子章名奎淮南人金華宋濓序
