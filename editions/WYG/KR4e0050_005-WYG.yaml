  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0050_WYG_005-1a, image: WYG1231/WYG1231-0666a.png}
body:
  text: 望雲集巻五明郭奎撰排律并諸雜詠書附上人一首江上華星照錦袍前驅甲胄左旌旄耿純附鳳先扶漢莊子觀魚昔在濠每為才求千里駿直將心服五陵豪山河王氣重經驗茅土功臣定見褒食客簮承新玳瑁上公酒賜内蒲萄地開梁汴雲初集天作周邦日漸髙共説英雄如管樂已知伯仲是蕭曹省垣薄暮移紅藥門徑餘陰長碧桃四牡勞賢紛雜還仙舟容我待遊遨楚平越定㸔歸馬弓矢明年詠載櫜送人修城還藝祖汾陽濟世才興唐社稷位三台兩京宫闕同時復萬乗鸞輿逺道囘中令簮纓今不沗左司衡鑑又重開朝廷用將皆熊虎宰相求賢辟草莱江口峨眉山偃蹇城頭雉堞石崔嵬經營豈譲周東洛楨幹誰知楚上材鐵甕時平民按堵湯池秋漲浪成堆曲連白紵桓温井髙接凌歊宋武臺日映旌旗明似練月低皷角響如雷郎官拱待囘車久玉樹垣陰勞俫杯題涇縣知縣榮卿壁李侯惠澤比涇清彷彿絃歌在武城百里省風民寡訟三年持法政皆平雨餘禾黍連阡緑月下機絲比屋聲秦制山河邦屬縣周官禮樂職分卿鸞栖荆棘難終止驥足雲霄自此升不使隱居遺碩徳已增恒産富編氓河陽閒地栽花滿彭澤公田種秫成六事考功誰最善召南風教有嘉名寄人賦五峰使節出雲霄細栁春深緑萬條多士雅歌思在泮諸侯嘉會慶登朝彤弓已錫櫜鞬寵玉燭應勞鼎鼐調共覩景星連北洛獨看銅柱鎮南標華隂遊騎旌旗簇川上光風鼓吹饒晉將素稱羊叔子漢兵爭附霍嫖姚神仙標格如瓊樹宰輔功名到珥貂髙誼相同呉季札海夷氛祲近来消夀詩惟天生俊傑濟世屬英豪間氣鍾華岳元勲壓巨鰲東山文物舊南極夀星髙公族嗟麟趾儒林起鳳毛郎官前甲胄使節左旌旄細栁迴兵仗香芸辟武韜珥貂先見擢汗馬豈辭勞談笑三軍却喑嗚萬騎逃運籌期管樂立業比蕭曹畵㦸行當道彤弓憶載櫜獨專方叔任重佩吕處刀此日祥初應當年慶可褒玉堦浮寳樹金母進蟠桃瑞靄迎雙鶴清聲被九臯嘉賓来騕褭童子獻蒲萄錦瑟尊前鼓瑶琹席上操銀絲鮮鱠鯉翠釡曉烹羔醉倚青油幕晴熏白錦袍升堂聞拜頌入府詠遊遨永祝三千嵗錢塘望海濤寄張明徳我憶張公子新詩句句工盛唐兼漢選大雅振王風光瑩瓊瑶並文章錦繡同朝陽鳴彩鳳白雪被焦桐擲地聲如石凌雲氣若虹少陵思杜曲小謝賦江東况與諸家異當為一代雄相知慚謬拙莫惜啟愚蒙失意驚蕉鹿因書託塞鴻右軍如見説飄泊似飛蓬宿五城旅憩五城館風泉日夕喧愛山如錦里對景想桃源鷄犬紛相雜漁樵數共言偶㸔溪上碓因叩酒家門草色知春意梅花憶故園鳥鳴深樹裡藥斸亂雲根佩劍思公子求仙訪白猿松窓聊偃息蘿逕待扳援明發逾前嶺星言至逺藩馳驅當效竭時務敢辭繁恐辱將軍命虚沾奉使恩願求天下士慷慨接竒論寄劉彦基同知五絶洪州别駕久相違驥足遲遲三月歸應被長干兒女笑春風不試繡羅衣御史臺前錦繡坊千官同日宴劉郎如今換却青驄馬潦倒風塵兩鬂霜南浦登樓一曲歌江花潭影照青蛾謝安不與人同樂天下蒼生奈若何先生於我義如山杯酒相逢適意間日晚江城多難後一官却羡治中閒九月征人未授衣年年書到故園稀無情恨殺湘東鴈不帶平安一字飛重憶寄從兄叔章湖亭面面對青山菱角新池月様彎惟有東家兄弟好幾時學得白眉閒翡翠屏風䕶掌珠日髙貪睡在流蘇鯉魚尾熟郎纔起婢子開門送玉壺白扇越羅如雪紫竹枝江南白波生藕絲乗鸞兒女上天去明月動引清風隨開嵗卧病多病文園渴未消自從人日遇花朝不知楊栁將春色緑到淮南第幾橋一朝卧病藥相扶纔倚晴窓閱地圖莫説江南風景好王孫頭白怨蘼蕪寄陳教授敏敬亭山下故人家榖雨晴時正摘茶我似盧仝酷相好春深休寄杜鵑花松樹連簷翠色多南湖春水澹生波習家舊宅雲林在明月滿船聽棹歌寄方氏甥䇿紫紵春衫白接䍦明年纔是冠巾時風流不減陽元相五色華牋解賦詩淮南三月杏花稀諸子紛紛賦浴沂中有方生年最少也隨冠者試春衣寄從弟貞水殿春深寳帳開雲中簫鼓下瑶臺女巫定索迎神曲玉字泥緘着意裁龍作人来聽讀書絳紗新剪夜窓虚山東舊族吾家譜白額名駒定是渠贈白紵山庵道人楊𤣥中四望亭前姑孰溪道人種玉住山西古松數株秋滿屋青鳥月明時一啼青山如龍雲氣深玉階涼露滴秋林司馬將軍白紵曲五枝花裡付鳴琴書所見一樹古梅花似雪半臨驛路半臨溪美人玉笛吹何處零落空山鳥自啼黄犢飲溪芳草滿青裙挑菜碧芹肥故山好處多如此湖上春風我憶歸徳興山中石橋斜日萬山陰雲滿寒溪雪滿林獨有梅花㸔不厭江南春色故園心路入深山忽有村隔溪烟火似桃源漁舟不喚行人渡洞裡春寒靜掩門樹頭飛翠濕空濛茅屋鷄鳴雪澗東好借呉興唐棣筆畵圖傳我是仙翁我愛劉郎俊有才鏡湖流水接天台明年二月桃花發儀鳳和鸞出洞来江水春深好弋鳬明星埀近屋東隅國風原自鷄鳴始雜珮郎今愛惜無文詞秀發建安風三十紅顔衞玠同却憶周南求淑女幾時寤寐在絲桐紙扇魯女在時曾剪縞齊姬去後更無紈當年標格難同致斜月涼風思萬端富池江口夜泊華髪青燈共一船聞鷄獨起㸔龍泉風雲未遂平生志慚愧周瑜長十年草昧英雄望列侯夢中三十六春秋功名總被儒冠誤兩㟁啼猿一夜愁瞿塘西上接成都天下竒才八陣圖梁父不因徐庶解終身隴畝一凡愚南康除夜去年馬上折梅花今夕匡廬度嵗華風雪苦寒如北土每因時節恨無家十年客泪不曾乾丘壠成行骨肉殘為報淮南兄與弟紫髯憔悴未為官銅陵寄劉知府雙尊特為故人將江路風濤忽渺茫坐對銅官不同飲馬蹄明日又涇陽江上九華翠欲流池陽太守舊交游月明良夜負清賞正似山陰雪後舟途中寄錢隱君穉青陽門下舊諸生長憶春風服既成我尚為童君已冠如今白髪見交情故國同門賦浴沂十年飄泊偶相依伯勞燕子何無分又復東西各自飛早發分宜縣萬山髙下宜春路舊縣人烟亂後稀荆棘十年生滿道不堪零露濕征衣夜半荒鷄鳴逺村板橋斜出縣西門征人衣上霜如雪猶未曾承國士恩六言桃葉渡邊芳草石頭城下寒潮六代繁華已矣月明何處吹簫古鏡芙蓉出渌水翡翠生丹砂上有六朝篆斑斑蝕土花驚鸞一朝去髙飛凌紫霞送李望瑞星言夙晨駕千里睦州城去去山如髪東南第幾程閒觀垂釣者乃見古人情棄世猶敝屣浮名安足榮桐廬一江水可以濯吾纓鷄鳴風雨夕既見子如何不樂復誰待相㸔華髪多秋江有清興明發聽謳歌市就君平卜岷峨有使過言歸當十月華省集鳴珂嵗暮鷄鳴刁斗歇展轉尚無眠華髪何為者離鄉今十年又嵗暮思故園翛翛早梅發物是人已非天涯但明月荅霍先生書某頓首再拜奉覆西霞先生尊丈前奉命往袁倉卒不獲詣辭歸塗蹭蹬又缺助㐮中心為欠令郎至辱手書令人大慙前后凡三承惠教足紉髙誼所示哀詩尤見孝情純至人子大事孰此為甚况當亂世克忠盡孝逍遥物外尤人所難惟先生能備之矣比聞小有不豫意或憂戚所致尚冀節哀三年通䘮聖經明訓過厚雖善遺體尤重霜柑少許聊将逺意冬寒未中萬乞自愛不備與錢文璧書某頓首再拜奉啟文璧徵君親契别来倐焉二載區區賤迹東逐西馳不異萍梗心勞日拙為之奈何思惟往昔與足下程西岩同舍曉牕夜燭或置琹尊或敲茶臼講道論心語無間然自兵再變程君去淛上物故僕亦流落逺途獨公在敬亭山水間室家相慶父子熈熈何樂如之人生聚散真猶一夢每中夕興懐未常不泫然流涕近景宗至辱寄聲感愧感愧如曾士美程兄季明教授乞道雅素之誼不具與王克譲張明徳書某謹載拜奉啟克譲明徳二執事别後凡兩更嵗律每東望敬亭雲氣輒心與神馳數承誨章備詢動履均吉為慰僕以萍蹤飄逐兼墮懶習不即裁荅諒為知已必不以此為嫌也今嵗六月自銅陵遵陸取道涇縣遂留水西苦於暑雨彌旬不獲趨造左右握手髙齋終日懽迨今悵恨比至洪州已秋仲矣始聞明徳入羅寨方以為憂景宗来知吉人天相已遂脱歸聖人所謂言忠信行篤敬此福善之騐也冬前有普宜使者還自皖城知執事在彼亦囘尤所謂見幾明決審於去就者也僕之近况惟有抱膝長吟而已景宗備能道之呵呵不悉望雲集巻五
