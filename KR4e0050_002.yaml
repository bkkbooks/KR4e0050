body:
  text: 望雲集卷二明郭奎撰七言古詩長相思長相思小山下蘼蕪秋深沒行路王孫年年歸不去江南木落天色寒鴻鴈滄波連日暮我思昔兮金佩環美人座上花如顔紫芝叢桂紛兩間下有流水清潺湲吹笙鼓瑟心長間别來嵗久鬢髮斑青雲猿鶴不可以企及魂飛夢往愁鄉關長相思何時還烏夜啼石頭城上烏遙夜鳴相呼紫清道士有兩樹烏啼不離樹髙處千聲啞啞復萬聲中堂酒闌夢未成呼童把燭起開户照樹惟恐鄰人驚庭前再拜為爾説我家舊住長淮北慈親已老返哺違零落猶為異鄉客嚴霜滿天江月輝東方未白羣星稀明朝日出當早飛莫使涕淚沾裳衣送劉别駕之饒州黑貂紫綺裘寶劍千金價冠蓋若雲從相送西陵下我持鞭君立馬彈銀筝進瑶斚漢家才子建安風昔為外史今别駕鄱陽湖水青如苔東州之民淳無懷匡廬屹立西江濶蒼翠九疊屏風開逍遙范公堂秋陰落庭槐嘉政繼前哲南山歌有臺文章揮灑謝康樂皎如遼天雪中鶴何以折贈千里行汀蘭有芳桂花作青雲論交金石堅執手欲别心茫然平生意氣凌五嶽擊節起舞秋風前春日行春風爾來何無情忽然吹我華髮生淮南三月花滿城金尊海錯羅雕楹美人對坐彈鳴箏酒酣起奏升天行當年歡樂不復得白日為照心未平心未平發長嘯我曹豈是閭閻兒齊東魯連頗同調新豐市宣城北六十里過新豐待沽酒雪華當空大如手斷橋荒店無人煙獨有寒梅伴疏栁憶昔江東未搆兵我亦曾經此地行東家槌牛出新釀西家開宴還吹笙春風步障千花錦當壚美人勸客飲形勢雖非漢祖為倣佛咸陽舊陵寢停驂慷慨懷馬周我欲濯髮臨清流斗酒不可得髙興良難酬著鞭遙指敬亭路孤雲日暮心悠悠送侯信之還宣城寧為執戟兒莫讀五車字讀書未逹空白頭執戟從軍有時貴憶君家住南湖西麻姑之山傍有溪雪林學士官滿日阿翁拄策同提㩦君從二十客淮北我家伯仲俱相識江湖水深舟楫多當年歡會今難得我因君想親君向我言貧相逢忽疑是夢寐干戈滿眼論悲辛風塵一别又五載耆舊凋零幾人在把酒共指青山亭君猶有家我何待惜無白玉鞭安得黃金千為君此别贈行李盡買湖曲桑麻田夜坐吟江風蕭蕭吹古樹關月蒼茫海生霧北斗漸落明河微城頭烏啼天欲曙客子不寐憂無衣東征三年猶未歸蟋蟀在户嵗將暮洞庭霜白芙蓉稀男兒生當百戰死不執金吾即挾匕閉門勿用長夜歌騏驥終能致千里婺婦詞東家婦西家泣東邊浮雲西邊日年芳良在茲朱顔如舜華城頭月出夜將半玉階金井啼寒鴉憶昔未嫁初嬌笑父母側郎騎竹馬妾倚床手折櫻桃共郎劇同居鄉里兩無猜長大亦得為家室自從結髮能幾時風塵四起遭離别良人執戟好戎馬出門屢致殷勤詞一朝富貴從所欲黃金滿籯珠滿斛孤人之子寡人妻積惡既盈禍亦速美人如花歌未央中庭日落悲且傷報仇壯士在咫尺十年兵散空倣徨空倣徨不能已顧妾哀啼淚如洗阿姫寵妓隨亂兵泥汚殘尸孰敢視空遺賤妾與小姑東家流落西家居五更泣罷向姑學願姑無如妾命薄七夕曲天河盈盈一水隔河東美人河西客耕雲織霧兩相望一嵗綢繆在今夕雙龍引車鵲作橋風回桂渚秋葉飄拋梭投杼整環佩金童玉女行相要兩情好合美如舊復恐天雞催曉漏倚屏猶有斷腸言東方未明少停候欲渡不渡河之湄君亦但恨生别離明年七夕還當期不見人間死别離朱顔一去難再歸從軍婦從軍婦良家女新梳北髻學邉語狐皮裁帽紵絲衫馬上徉羞見親故黃巾盜賊亂中華去年燒我父母家天朝命將專征伐強兵爭奪顔如花顔如花命如葉此身一失無名節憶昔姑家納采時燈前豫綰同心結嫁夫誓擬齊蛾眉誰知萬里為軍妻木綿帳低風日惡五紋刺繡思深閨思深閨難再得人生莫願多顔色東鄰女伴醜且貧鄉里不出成家室寄衣曲華燈暗室秋夜長吳刀剪綵為衣裳欲縫不縫心惻惻還向姑前較寬窄燕山八月雪若寒氊褐狐裘俱擘裂明朝驛使催征車白袍絮就愁寫書舅姑已老妾無子願君早曳王門裾臨行封裹復致意著時莫遣沙塵穢妾薄命鳳求凰兮我所思顧山雞兮何與棲蘭為佩兮芙蓉姿衷心懷兮誰可知良人沒兮遭流離流離極兮忘令儀側室陰兮春草萋雲不歸兮魂欲迷憶初逺兮父母拜姑嫜兮容與不諒兮今日憤怨兮悽楚覽塵鏡兮私自傷嗟薄命兮將誰訴留别王指揮銀鞍寶馬青連錢風雨夜吼雙龍泉我乃公子無忌客因知平原君最賢五千甲士猛如虎地裂山摧振金鼓島夷率服西南清右軍門前奏歌舞貽李道士茅山李道士賣藥巢湖上頭戴烏紗巾手植青藜杖雙鬟童子相隨行向月壺中吹玉笙紫芝採罷忽不見又騎玄鶴登蓬瀛望雲集卷二
